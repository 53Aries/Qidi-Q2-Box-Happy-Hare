#  Q2

[gcode_macro PRINTER_PARAM]
variable_max_x_position: 270.0
variable_max_y_position: 270.0
variable_max_z_position: 260.0
variable_clear_x_position :88.0
variable_clear_y_position :287.0
gcode:












[gcode_macro SHAKE_OOZE]
gcode:
    MOVE_TO_TRASH
    M204 S2000
    M400
    G4 P500
    G91 
    {% for y in range(1,14) %}
        G1 Y-1 F20000
#        G4 P50
        G1 Y1 F20000
#       G4 P50
    {% endfor %}
    G90

[gcode_macro MOVE_TO_TRASH]
gcode:
#    _CG28
    
    {% if "xy" not in printer.toolhead.homed_axes %}
        G28 X Y
    {% endif %}
    M204 S5000
    {% if (printer.gcode_move.position.y) > 270 %}
        {% if (printer.gcode_move.position.x) > 112 or (printer.gcode_move.position.x) < 85 %}
            G1 Y270 F20000
            G1 X85 F20000
            G1 Y270 F20000
            G1 Y287.5 F3000
        {% endif %}
        G1 X85 F20000
        G1 Y287.5 F3000
    {% else %}
        G1 X85 F20000
        G1 Y260 F20000
        G1 Y287.5 F3000
    {% endif %}

[gcode_macro EXTRUSION_AND_FLUSH]
gcode:
    {% set hotendtemp = params.HOTEND|int %}
    MOVE_TO_TRASH
    M109 S{hotendtemp}
    M83
    {% for i in range(4) %}
        G1 X{85 + i % 2 * 3} F5000
        {% for j in range(1,6) %}
            G1 E9 F300
            G1 E1 F50
        {% endfor %}
    {% endfor %}
    G1 E-1 F1800
    M400
    M106 S255
    M400
    G4 P5000
    CLEAR_OOZE
    CLEAR_FLUSH
    MOVE_TO_TRASH
    M106 S0







	




[gcode_macro SHAPER_CALIBRATE]
rename_existing: RESHAPER_CALIBRATE
gcode:
    RESHAPER_CALIBRATE FREQ_START=20 FREQ_END=150
    
[gcode_macro PRINT_END]
gcode:
    M400
    save_zoffset
    SET_IDLE_TIMEOUT TIMEOUT={printer.configfile.settings.idle_timeout.timeout}
    CLEAR_PAUSE
    M106 P2 S0
    M106 P0 S0
    
    M104 S0
    M140 S0
    M141 S0

    M220 S100
    M221 S100
    M84
	
    DISABLE_ALL_SENSOR
    BED_MESH_CLEAR
    G31
    CLEAR_LAST_FILE
    BEEP I=2 DUR=500
    SDCARD_RESET_FILE

[gcode_macro CANCEL_PRINT]
rename_existing: BASE_CANCEL_PRINT
gcode:
    {% if "xyz" in printer.toolhead.homed_axes %}
        M204 S10000   
        G90
        {% if (printer.gcode_move.position.z) < 100 %}
        G1 Z100 F600                                       
        {% endif %}
        {% if (printer.gcode_move.position.y) > printer['gcode_macro PRINTER_PARAM'].max_y_position %}
            G1 Y{printer['gcode_macro PRINTER_PARAM'].max_y_position - 50} F6000                                       
        {% endif %}
        G1  X265 Y5 F7800
    {% endif %}
    M400
    save_zoffset
    SET_IDLE_TIMEOUT TIMEOUT={printer.configfile.settings.idle_timeout.timeout}

    M106 P2 S0
    M106 P0 S0
    M106 P3 S0
    
    M104 S0
    M140 S0
    M141 S0

    M220 S100
    M221 S100
    M84
	
    DISABLE_ALL_SENSOR
    SET_GCODE_OFFSET Z=0 MOVE=0
    BED_MESH_CLEAR
    G31
    BEEP I=2 DUR=500

    BASE_CANCEL_PRINT
    CLEAR_LAST_FILE
    M118 Canceled print!






[gcode_macro M141]
gcode:
    {% if printer["heater_generic chamber"] is defined %}
        {% set s = params.S|float %}
        SET_HEATER_TEMPERATURE HEATER=chamber TARGET={([s, 65]|min)}
    {% endif %}


[gcode_macro M191]
gcode:
    {% if printer["heater_generic chamber"] is defined %}
        {% set s = params.S|float %}
    
        M141 {% for p in params %}{'%s%s' % (p, params[p])}{% endfor %}  
        {% if s != 0 %}
            TEMPERATURE_WAIT SENSOR="heater_generic chamber" MINIMUM={([s, 65]|min)-2}
        {% endif %}
    {% endif %}
     


[gcode_macro M107]
gcode:  
    SET_FAN_SPEED FAN=cooling_fan SPEED=0





[gcode_macro M290]
gcode:
   SET_GCODE_OFFSET Z_ADJUST={params.Z}


       








[gcode_macro CUT_FILAMENT_1]
gcode:
    {% if "xy" not in printer.toolhead.homed_axes %}
        G28 X Y
    {% endif %}
    M204 S10000
    {% if (printer.gcode_move.position.x) < 15 %}
        G1 X15 F9000
        G1 Y0.5 F9000
    {% endif %}
    G1 Y0.5 F15000
    G1 X15 F15000
    G1 X-0.5 F5000
    G4 P1000
    G1 X1 F1000
    G1 X-0.5 F5000
    G4 P1000
    G1 X1 F1000
    G4 P1000
    G1 X15 F3000

[gcode_macro M603]
description: filament unlode
gcode:
    DISABLE_ALL_SENSOR
    {% set hotendtemp = params.S|default(250)|int %}
    _CG28
    M104 S{hotendtemp}

    MOVE_TO_TRASH
    M109 S{hotendtemp}
    M118 Heat up complete

    G92 E0 
    G1 E-10 F300     #退料10mm

    #{% if printer.save_variables.variables.box_count > 0 and printer["box_extras"]%}
    #    E_UNLOAD SLOT=16
    #{% else %}
        CUT_FILAMENT_1
        MOVE_TO_TRASH
        G92 E0 
        G1 E-60 F300     #退料60mm
    #{% endif %}

    M104 S0

    G1 X{printer['gcode_macro PRINTER_PARAM'].clear_x_position + 20} F15000
    G1 X{printer['gcode_macro PRINTER_PARAM'].clear_x_position} F5000
    G1 X{printer['gcode_macro PRINTER_PARAM'].clear_x_position + 20} F15000
    G1 X{printer['gcode_macro PRINTER_PARAM'].clear_x_position} F5000
    G1 X{printer['gcode_macro PRINTER_PARAM'].clear_x_position + 20} F15000
    G1 X{printer['gcode_macro PRINTER_PARAM'].clear_x_position} F5000
    G1 X{printer['gcode_macro PRINTER_PARAM'].clear_x_position + 20} F15000
    G1 X{printer['gcode_macro PRINTER_PARAM'].clear_x_position} F5000

    M106 S0
    M400
    M118 Unload finish

[gcode_macro M604]
gcode:
    DISABLE_ALL_SENSOR
    {% set hotendtemp = params.S|default(250)|int %}
    {% set mode = params.T|default(0)|int %}
    {% if mode == 0 %} 
        _CG28
        MOVE_TO_TRASH
    {% endif %}
    #{% if printer.save_variables.variables.box_count > 0 and mode == 0 and printer["box_extras"]%}
    #    M118 check box filament
    #    E_LOAD SLOT=16 S={hotendtemp}
    #{% endif %}
    {% if mode == 0 %}  #第一次进料
        M104 S{hotendtemp}
        MOVE_TO_TRASH
        M109 S{hotendtemp}
        M118 Heat up complete
        G92 E0
        G1 E80 F400
        M400
    {% elif mode ==1 %}      #重试发送 M=1
        MOVE_TO_TRASH
        M109 S{hotendtemp}
        M118 Heat up complete
        G92 E0
        G1 E80 F400
        M400
    {% endif %}
    M118 Load finish










